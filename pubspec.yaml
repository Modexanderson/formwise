name: formwise
description: "Smart form fields for Flutter with auto-validation, auto-formatting, typo detection, and animated error feedback. Supports email, phone, credit card, URL, and custom fields."
version: 1.1.0
homepage: https://github.com/modexanderson/formwise
repository: https://github.com/modexanderson/formwise
issue_tracker: https://github.com/modexanderson/formwise/issues

topics:
  - form
  - validation
  - input
  - formatting
  - widgets

environment:
  sdk: ^3.10.7
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  tflite_flutter: ^0.12.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
